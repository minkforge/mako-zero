# mako-zero config.
# install.sh seeds this to /srv/mako-zero/config.yaml on first run.
# Edit there, fill in secrets, chmod 600 (root:mako-zero is fine).

paths:
  root: /srv/mako-zero
  state: /srv/mako-zero/state
  notes: /srv/mako-zero/notes
  workdir: /srv/mako-zero/workdir
  archive: /srv/mako-zero/archive
  logs: /srv/mako-zero/logs
  pending: /srv/mako-zero/pending
  prompts: /srv/mako-zero/prompts

llm:
  # Both slots use Ollama Cloud — same key, different models. The fallback
  # only fires if primary times out or returns an error. Both must be models
  # that support native tool-calling (structured `tool_calls` field), since
  # the worker tick now runs as an in-tick tool-use loop.
  primary:
    type: ollama
    base_url: https://ollama.com
    api_key: ""               # Ollama Cloud key
    model: gpt-oss:120b       # OpenAI open-weights, native thinking + tool calls, fast (~3s tiny prompts)
    timeout_s: 60             # per-step timeout inside the tool loop
    num_predict: 16000
  fallback:
    type: ollama
    base_url: https://ollama.com
    api_key: ""               # same Ollama Cloud key
    model: kimi-k2-thinking   # Moonshot reasoning model, native tool calls, slower but solid
    timeout_s: 60
    num_predict: 16000

context:
  max_input_tokens: 80000     # gpt-oss & kimi both have 128K+ windows; we use the room
  recent_journal_lines: 60    # was 20 — bigger working memory across ticks
  max_requested_notes: 5      # was 3

tick:
  shell_timeout_s: 30
  http_timeout_s: 30
  http_response_max_bytes: 8192
  shell_output_max_bytes: 4096
  compact_every_n_ticks: 100  # was 50 — JOURNAL was getting compacted too eagerly
  approval_threshold_pence: 200
  budget_ceiling_pence_month: 10000  # £100/mo
  telegram_summary_max_chars: 1000   # per-tick Telegram log message cap
                                     # (Telegram itself caps at 4096; this is
                                     #  our soft cap so blow-by-blows stay punchy.
                                     #  Bump for verbose runs, lower for quieter.)

# In-tick tool-use loop: the model can call shell / read_file / write_file /
# http_get / git / cf_api / telegram_post / ask_chris / request_resource as
# tools and see results before deciding next step. Loop terminates when the
# model calls the `finish` tool (or content with no tool_calls) or hits the
# iteration cap.
tool_loop:
  max_iterations: 12          # hard cap on LLM round-trips per tick (3-6 is typical)
  soft_deadline_s: 300        # if elapsed > this, ask the model to wrap up soon
  loop_detect_recent: 5       # compare new work_done against last N journal entries
  loop_detect_ratio: 0.6      # SequenceMatcher ratio threshold — 0.6 = "very similar"
  loop_detect_count: 3        # if N+ recent entries are similar → flag + force generative

telegram:
  bot_token: ""
  chat_id: "-1003763660732"
  log_thread_id: 9
  requests_thread_id: 161
  approvals_thread_id: 0       # set to a real id once the topic exists
  digest_thread_id: 0          # daily digest goes here; falls back to log_thread
  revenue_thread_id: 0         # revenue events; Mako-driven (see CAPABILITIES)
  meta_thread_id: 0            # Chris↔meta steering; inbound here lands in state/META_INBOX.md
                               # and meta status pings post here

# Used when an `email_send` gated action is approved via Telegram reply.
# If left blank, approve→email won't work; the action will return an error.
fastmail:
  smtp_host: smtp.fastmail.com
  smtp_port: 465
  user: ""                     # mako@minkforge.com
  from: ""                     # usually same as user
  smtp_password: ""            # Fastmail app password

# Used when a `cf_api` gated action is approved via Telegram reply.
# If left blank, approve→cf_api won't work; the action will return an error.
cloudflare:
  token: ""
  account_id: ""

digest:
  enabled: true
  hours_window: 24             # how far back to summarise

supervisor:
  tick_interval_s: 180         # 3 min — gap between END of one tick and START of next
                               # (was 120; the new tool-loop ticks are deeper, lower-frequency)
  digest_hour_local: 8
  tick_timeout_s: 480          # 8 min hard ceiling — was 300; tool-loop needs room
  digest_timeout_s: 60
  scribe_interval_s: 7200      # 2 hours — scribe runs between worker ticks
  scribe_timeout_s: 360        # writing-heavy, can be slower than worker tick
  meta_interval_s: 1800        # 30 min — meta loop cadence (when enabled)
  meta_timeout_s: 720          # codex can be slow — 12 min ceiling

# Meta loop — third process that runs Codex on the box every meta_interval_s
# to propose small patches to prompts/ and config.yaml. Off by default; set
# enabled: true once you've confirmed `codex` is on PATH and willing to run
# without interactive prompts.
meta:
  enabled: false
  codex_model: gpt-5.5
  timeout_s: 600

scribe:
  enabled: true
  recent_journal_lines: 100    # full picture, not just last 20
  max_drafts_per_run: 1        # avoid flooding the outbox
  publish_announce_thread: log # approvals | requests | log — where the autopublish heads-up goes (publishes are autonomous; no approval)
  daily_publish_cap: 2         # max blog posts auto-published per UTC day
  publish_dir: /var/www/html/blog  # nginx-served path for the static site

# Chris's working hours. Mako sees this in hot context and is told to defer
# approval-needing work outside the window. Approval pings still queue
# out-of-hours but go silent (no phone buzz) — they'll be visible in the
# channel when you check. Empty `windows` = always available.
availability:
  tz: Europe/London
  windows:
    - { days: [mon, tue, wed, thu, fri], start: "09:00", end: "18:00" }
  sla_in_window_min: 60
  sla_out_window_min: 720
  suppress_approval_pings_out_of_window: true

logging:
  full_payload: true           # write logs/ticks/<n>.json with raw req/resp
  keep_days: 14                # `find logs/ticks logs/scribe -mtime +N -delete`
                               # (V0 doesn't auto-rotate; you do it yourself)

guardrails:
  shell_denylist_substrings:
    - "rm -rf /"
    - "rm -rf ~"
    - ":(){"
    - "mkfs"
    - "dd if=/dev/zero"
    - "dd if=/dev/random"
    - "shutdown"
    - "reboot"
    - "halt"
    - "passwd"
    - "useradd"
    - "userdel"
    - "chown -R"
    - "chmod 777 /"
    - "/etc/shadow"
    - "/etc/passwd"
    - " > /dev/sda"
  writable_paths:
    - state
    - notes
    - workdir
    - archive
    - pending
  forbidden_paths:
    - prompts
    - tick.py
    - supervisor.py
    - digest.py
    - analyse.py
    - scribe.py
    - install.sh
    - mako-zero.service
    - config.yaml
    - state/MISSION.md         # frozen, Chris-only
    - state/CAPABILITIES.md    # Chris-only edits
