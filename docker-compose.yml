services:
  mako-zero:
    build: .
    image: mako-zero:latest
    container_name: mako-zero
    restart: unless-stopped

    # /data holds state, notes, archive, logs, pending, AND config.yaml.
    # Make sure the host dir is owned by UID/GID 10001 (the mako user
    # baked into the image): chown -R 10001:10001 ./data
    volumes:
      - ./data:/data

    # Override TZ here if you don't want Europe/London.
    environment:
      TZ: Europe/London

    # Resource ceilings. LLM calls are remote so the container
    # mostly idles, but headroom is cheap and useful when an `http_get`
    # action returns a fat page or `shell` does something busy.
    mem_limit: 2048m
    cpus: 2.0

    # Stream all supervisor / tick / digest stdout to the docker log.
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
