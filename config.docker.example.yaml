# mako-zero — Docker deployment config.
# Copied into /data/config.yaml on first boot if missing.
# After first boot: edit, fill in secrets, chmod 600 (on the host), restart.

paths:
  root: /data
  state: /data/state
  notes: /data/notes
  workdir: /data/workdir
  archive: /data/archive
  logs: /data/logs
  pending: /data/pending
  prompts: /app/prompts             # baked into the image, read-only

llm:
  primary:
    type: ollama
    base_url: https://ollama.com
    api_key: ""
    model: kimi-k2.6
    timeout_s: 180
    num_predict: 12000
  fallback:
    type: openai_compat
    base_url: ""
    api_key: ""
    model: ""
    timeout_s: 90
    num_predict: 8000

context:
  max_input_tokens: 18000
  recent_journal_lines: 20
  max_requested_notes: 3

tick:
  shell_timeout_s: 30
  http_timeout_s: 30
  http_response_max_bytes: 8192
  shell_output_max_bytes: 4096
  compact_every_n_ticks: 50
  approval_threshold_pence: 200
  budget_ceiling_pence_month: 10000

telegram:
  bot_token: ""
  chat_id: "-1003763660732"
  log_thread_id: 9
  requests_thread_id: 161
  approvals_thread_id: 0
  digest_thread_id: 0

digest:
  enabled: true
  hours_window: 24

supervisor:
  tick_interval_s: 120
  digest_hour_local: 8
  tick_timeout_s: 300
  digest_timeout_s: 60

guardrails:
  shell_denylist_substrings:
    - "rm -rf /"
    - "rm -rf ~"
    - ":(){"
    - "mkfs"
    - "dd if=/dev/zero"
    - "dd if=/dev/random"
    - "shutdown"
    - "reboot"
    - "halt"
    - "passwd"
    - "useradd"
    - "userdel"
    - "chown -R"
    - "chmod 777 /"
    - "/etc/shadow"
    - "/etc/passwd"
    - " > /dev/sda"
  writable_paths:
    - state
    - notes
    - workdir
    - archive
    - pending
  forbidden_paths:
    - prompts
    - tick.py
    - supervisor.py
    - digest.py
    - analyse.py
    - config.yaml
    - state/MISSION.md
    - state/CAPABILITIES.md
